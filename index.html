<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>住院藥局盤點APP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader" class="loading-overlay"><div class="spinner-border text-academic mb-2"></div><div class="fw-bold text-academic">系統處理中...</div></div>
  <div id="toast-container"></div>

  <nav class="navbar navbar-dark navbar-academic fixed-top d-flex justify-content-between px-3">
    <span class="navbar-brand mb-0 h6 text-truncate" style="max-width: 70%;"><i class="bi bi-hospital"></i> 藥局盤點APP | <span id="nav-info">未登入</span></span>
    <button class="btn btn-sm btn-outline-light fw-bold" onclick="handleLogout()">登出</button>
  </nav>

  <div id="view-login" class="container view-section active">
    <div class="card card-academic p-4 mt-4 bg-white shadow">
      <h4 class="text-center mb-4 fw-bold text-academic"><i class="bi bi-shield-lock"></i> 身分驗證</h4>
      <input type="text" id="login-id" class="form-control form-control-lg mb-3 shadow-sm border-secondary" placeholder="員工編號">
      <input type="password" id="login-pwd" class="form-control form-control-lg mb-4 shadow-sm border-secondary" placeholder="密碼">
      <button class="btn btn-academic btn-lg w-100 fw-bold shadow-sm" onclick="handleLogin()">進入系統</button>
    </div>
  </div>

  <div id="view-mode-select" class="container view-section">
    <div class="card card-academic p-4 mt-4 text-center bg-white shadow">
      <h5 class="mb-4 text-academic fw-bold">請選擇作業模式</h5>
      <button class="btn btn-outline-academic btn-lg w-100 py-3 mb-3 fw-bold shadow-sm" onclick="selectMode('每日盤點')"><i class="bi bi-calendar-check fs-3 d-block mb-1"></i> 每日盤點作業</button>
      <button class="btn btn-outline-academic btn-lg w-100 py-3 mb-3 fw-bold shadow-sm" onclick="selectMode('月盤點')"><i class="bi bi-calendar-month fs-3 d-block mb-1"></i> 月盤點作業</button>
    </div>
  </div>

  <div id="view-daily-app" class="container-fluid view-section">
    <div class="card card-academic p-3 shadow-sm mb-2 bg-white flex-shrink-0">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="fw-bold text-academic mb-0 d-flex align-items-center gap-2"><button class="btn btn-outline-secondary fw-bold py-2" onclick="switchView('view-mode-select')"><i class="bi bi-chevron-left"></i> 返回</button><span>每日盤點</span></h5>
        <input type="date" id="header-date-select" class="form-control py-2 w-auto fw-bold shadow-sm text-academic border-secondary" onchange="changeDailyDate()">
      </div>
      <div class="d-flex gap-2 mt-1 mb-2">
        <button class="btn btn-outline-academic fw-bold flex-grow-1 shadow-sm py-2" onclick="initHistoryMode()"><i class="bi bi-journal-text"></i> 對帳與明細</button>
        <button id="btn-admin-sort" class="btn btn-outline-academic fw-bold flex-grow-1 shadow-sm py-2 d-none" onclick="openAdminSort()"><i class="bi bi-grip-vertical"></i> 管理排序</button>
      </div>
      <ul class="nav nav-pills nav-fill gap-2 mt-1" id="daily-tabs">
        <li class="nav-item"><button class="nav-link active fw-bold border bg-academic shadow-sm text-white py-2" id="btn-tab-uncounted" onclick="switchDailyTab('未盤')">未盤點 (<span id="count-uncounted">0</span>)</button></li>
        <li class="nav-item"><button class="nav-link fw-bold border text-success shadow-sm bg-white py-2" id="btn-tab-counted" onclick="switchDailyTab('已盤')">已盤點 (<span id="count-counted">0</span>)</button></li>
      </ul>
    </div>
    <div id="daily-list-area" class="flex-grow-1 overflow-auto px-1 pb-4"></div>
  </div>

  <div id="view-admin-sort" class="container-fluid view-section">
    <div class="card card-academic p-3 shadow-sm mb-2 bg-white flex-shrink-0">
      <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
        <h5 class="fw-bold mb-0 text-academic"><i class="bi bi-grip-vertical"></i> 拖拉排序管理</h5>
        <button class="btn btn-outline-secondary fw-bold py-2" onclick="switchView('view-daily-app')">返回</button>
      </div>
      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success flex-grow-1 fw-bold shadow-sm py-2" onclick="saveAdminDataToServer()"><i class="bi bi-cloud-arrow-up"></i> 儲存順序</button>
        <button class="btn btn-outline-danger fw-bold shadow-sm py-2" onclick="rebuildAdminList()"><i class="bi bi-arrow-clockwise"></i> 重建</button>
      </div>
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-secondary"><i class="bi bi-search"></i></span>
        <input type="text" id="admin-search-input" class="form-control py-2 border-secondary" placeholder="搜尋位置..." onkeyup="highlightSearchItem()">
      </div>
    </div>
    <div id="admin-sortable-list" class="flex-grow-1 overflow-auto px-1 pb-4"></div>
  </div>

  <div id="view-monthly-app" class="container-fluid view-section">
    <div class="card card-academic p-2 shadow-sm mb-2 border-0 bg-white flex-shrink-0">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <h6 class="fw-bold text-academic mb-0 d-flex align-items-center gap-2"><button class="btn btn-outline-secondary fw-bold py-2" onclick="switchView('view-mode-select')"><i class="bi bi-chevron-left"></i> 返回</button><span><i class="bi bi-calendar-month"></i> 月盤點作業</span></h6>
      </div>
      <ul class="nav nav-pills nav-fill gap-1 mt-1" id="monthly-tabs">
        <li class="nav-item"><button class="nav-link fw-bold border border-secondary shadow-sm active bg-academic text-white py-2" id="btn-tab-stock" onclick="switchMonthlyTab('tab-stock')">庫存</button></li>
        <li class="nav-item"><button class="nav-link fw-bold border border-secondary shadow-sm text-academic bg-white py-2" id="btn-tab-dispense" onclick="switchMonthlyTab('tab-dispense')">調劑台</button></li>
        <li class="nav-item"><button class="nav-link fw-bold border border-secondary shadow-sm text-academic bg-white py-2" id="btn-tab-online" onclick="switchMonthlyTab('tab-online')">線上</button></li>
        <li class="nav-item"><button class="nav-link fw-bold border border-secondary shadow-sm text-academic bg-white py-2" id="btn-tab-dashboard" onclick="switchMonthlyTab('tab-dashboard')">進度</button></li>
        <li class="nav-item"><button class="nav-link fw-bold border border-secondary shadow-sm text-academic bg-white py-2" id="btn-tab-records" onclick="switchMonthlyTab('tab-records')">紀錄</button></li>
      </ul>
    </div>

    <div id="tab-stock" class="monthly-content-section flex-grow-1 overflow-auto px-1 active">
      <ul class="nav nav-pills nav-fill gap-2 mb-2 px-1"><li class="nav-item"><button class="nav-link active fw-bold border bg-academic text-white shadow-sm py-2" id="btn-stock-sub-input" onclick="switchStockSubTab('input')">盤點輸入</button></li><li class="nav-item"><button class="nav-link fw-bold border text-success bg-white shadow-sm py-2" id="btn-stock-sub-list" onclick="switchStockSubTab('list')">已盤點 (<span id="count-stock-counted">0</span>)</button></li></ul>
      <div id="area-stock-input" class="card p-2 border-0 shadow-sm mb-2 bg-white">
        <div class="position-relative mb-2"><input type="text" id="stock-drug-search" class="form-control form-control-lg bg-light border-secondary fw-bold" placeholder="🔍 搜尋藥名或代碼..." onkeyup="handleStockSearch()" autocomplete="off"><div id="stock-dropdown" class="search-dropdown text-start shadow"></div></div>
        <div id="stock-selected-card" class="d-none p-2 mb-2 border border-success rounded bg-light"><div class="fw-bold text-dark fs-5 mb-1" id="stock-sel-name"></div><div class="d-flex gap-2 small"><span class="badge bg-academic">加P: <span id="stock-sel-inv"></span></span><span class="badge bg-secondary">批價: <span id="stock-sel-price"></span></span></div></div>
        <div class="input-group shadow-sm"><input type="number" id="stock-qty" class="form-control form-control-lg border-secondary fw-bold text-center" placeholder="數量" inputmode="numeric" pattern="[0-9]*"><button class="btn btn-academic px-4 fw-bold fs-5" onclick="submitMonthlyStock()">確認寫入</button></div>
        <div id="stock-success-card" class="d-none"></div>
      </div>
      <div id="area-stock-list" class="d-none"><div id="stock-records-area"></div></div>
    </div>

    <div id="tab-dispense" class="monthly-content-section flex-grow-1 overflow-auto px-1 d-none">
      <div class="card p-2 border-0 shadow-sm mb-2 bg-white">
        <select id="monthly-table-select" class="form-select form-select-lg border-secondary fw-bold text-academic shadow-sm mb-2" onchange="handleTableSelectChange()"></select>
        <ul class="nav nav-pills nav-fill gap-2"><li class="nav-item"><button class="nav-link active fw-bold border bg-academic text-white shadow-sm py-2" id="btn-desk-sub-input" onclick="switchDeskSubTab('input')">未盤點 (<span id="count-desk-uncounted">0</span>)</button></li><li class="nav-item"><button class="nav-link fw-bold border text-success bg-white shadow-sm py-2" id="btn-desk-sub-list" onclick="switchDeskSubTab('list')">已盤點 (<span id="count-desk-counted">0</span>)</button></li></ul>
      </div>
      <div id="area-desk-input"><div id="monthly-desk-area" class="pb-5"></div></div>
      <div id="area-desk-list" class="d-none"><div id="desk-records-area" class="pb-5"></div></div>
    </div>

    <div id="tab-online" class="monthly-content-section flex-grow-1 overflow-auto px-1 d-none">
      <ul class="nav nav-pills nav-fill gap-2 mb-2 px-1"><li class="nav-item"><button class="nav-link active fw-bold border bg-academic text-white shadow-sm py-2" id="btn-online-sub-input" onclick="switchOnlineSubTab('input')">線上作業</button></li><li class="nav-item"><button class="nav-link fw-bold border text-success bg-white shadow-sm py-2" id="btn-online-sub-list" onclick="switchOnlineSubTab('list')">已作業 (<span id="count-online-counted">0</span>)</button></li></ul>
      <div id="area-online-input" class="card p-2 border-0 shadow-sm mb-2 bg-white">
        <div class="d-flex gap-2 mb-2"><input type="radio" class="btn-check" name="dispType" id="disp-minus" value="調劑" checked><label class="btn btn-outline-academic flex-grow-1 fw-bold py-2 shadow-sm fs-6" for="disp-minus">調劑 (-)</label><input type="radio" class="btn-check" name="dispType" id="disp-plus" value="退藥"><label class="btn btn-outline-academic flex-grow-1 fw-bold py-2 shadow-sm fs-6" for="disp-plus">退藥 (+)</label></div>
        <div class="d-flex gap-2 mb-2 border-bottom pb-2"><input type="radio" class="btn-check" name="actionType" id="action-manual" value="手動" checked onchange="updateOnlineUI()"><label class="btn btn-outline-academic flex-grow-1 fw-bold py-2 shadow-sm fs-6" for="action-manual">手動搜尋</label><input type="radio" class="btn-check" name="actionType" id="action-barcode" value="條碼" onchange="updateOnlineUI()"><label class="btn btn-outline-academic flex-grow-1 fw-bold py-2 shadow-sm fs-6" for="action-barcode">條碼掃描</label></div>
        <div id="area-manual">
          <div class="position-relative mb-2"><input type="text" id="online-drug-search" class="form-control form-control-lg bg-light border-secondary fw-bold" placeholder="🔍 搜尋..." onkeyup="handleOnlineSearch()" autocomplete="off"><div id="online-dropdown" class="search-dropdown text-start shadow"></div></div>
          <div id="online-selected-card" class="d-none p-2 mb-2 border border-academic rounded bg-light small fw-bold">選定: <span id="online-sel-name" class="text-dark fs-6"></span><br>代碼: <span id="online-sel-inv" class="text-academic"></span></div>
          <div class="input-group shadow-sm"><input type="number" id="online-qty" class="form-control form-control-lg border-secondary fw-bold text-center" placeholder="數量" inputmode="numeric" pattern="[0-9]*"><button class="btn btn-academic px-4 fw-bold fs-5" onclick="submitMonthlyOnline('手動')">確認寫入</button></div>
        </div>
        <div id="area-barcode" class="d-none">
          <div class="input-group shadow-sm"><input type="text" id="online-barcode" class="form-control form-control-lg bg-light border-secondary fw-bold text-academic" placeholder="掃描槍請點此..." onchange="parseBarcodeAndSubmit()"><button class="btn btn-academic px-3 fw-bold fs-5" type="button" id="btn-start-camera" onclick="startLiveScanner()"><i class="bi bi-camera-video"></i> 開啟相機</button></div>
          <div id="scanner-wrapper" class="d-none mb-2 mt-2 border border-secondary rounded p-2 bg-light shadow-sm text-center"><div class="d-flex justify-content-between align-items-center mb-2 px-2"><span class="fw-bold text-academic small"><i class="bi bi-upc-scan"></i> 對準條碼...</span><button class="btn btn-sm btn-outline-danger fw-bold" onclick="closeLiveScanner()">❌ 關閉</button></div><div id="scanner-container" style="width: 100%; max-width: 400px; margin: 0 auto; background: #000; overflow: hidden; border-radius: 8px;"><div id="reader" style="width: 100%;"></div></div></div>
        </div>
        <div id="online-success-card" class="d-none"></div>
      </div>
      <div id="area-online-list" class="d-none"><div id="online-records-area" class="pb-5"></div></div>
    </div>

    <div id="tab-dashboard" class="monthly-content-section flex-grow-1 overflow-auto px-2 d-none">
      <div class="card p-2 border-0 shadow-sm mb-3 bg-white sticky-top" style="top:0; z-index:10;">
        <button class="btn btn-academic w-100 fw-bold py-2 shadow-sm" onclick="refreshDashboardData()">
          <i class="bi bi-arrow-clockwise"></i> 主動更新進度狀態
        </button>
      </div>

      <div class="dashboard-group mb-4">
        <h6 class="fw-bold text-danger border-start border-4 border-danger ps-2 mb-3">🕒 未完成 (進行中)</h6>
        <div id="dashboard-unfinished"></div>
      </div>

      <div class="dashboard-group mb-5">
        <h6 class="fw-bold text-success border-start border-4 border-success ps-2 mb-3">✅ 已完成盤點</h6>
        <div id="dashboard-finished"></div>
      </div>
    </div>

    <div id="tab-records" class="monthly-content-section flex-grow-1 overflow-auto px-1 d-none">
      <div class="card p-2 border-0 shadow-sm mb-2 bg-white text-center flex-shrink-0"><div class="text-academic fw-bold mb-1">總筆數 (<span id="user-records-count">0</span>)</div><button class="btn btn-outline-academic btn-sm fw-bold w-100 py-2" onclick="loadUserRecords()"><i class="bi bi-arrow-clockwise"></i> 重新下載雲端紀錄</button></div>
      <div id="user-records-area" class="pb-5"></div>
    </div>
  </div>

  <div id="view-history-app" class="container-fluid view-section">
    <div class="card card-academic p-3 shadow-sm mb-2 bg-white flex-shrink-0">
      <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
        <h6 class="fw-bold text-academic mb-0"><i class="bi bi-journal-text"></i> 對帳與明細</h6>
        <button class="btn btn-outline-secondary fw-bold shadow-sm py-2" onclick="switchView('view-daily-app')"><i class="bi bi-chevron-left"></i> 返回</button>
      </div>
      <div class="row g-2 mb-2">
        <div class="col-6"><input type="date" id="history-start-date" class="form-control py-2 border-secondary shadow-sm"></div>
        <div class="col-6"><input type="date" id="history-end-date" class="form-control py-2 border-secondary shadow-sm"></div>
      </div>
      <button class="btn btn-academic w-100 fw-bold shadow-sm py-2 mb-2" onclick="loadHistoryData()"><i class="bi bi-search"></i> 執行結算查詢</button>
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-secondary"><i class="bi bi-search"></i></span>
        <input type="text" id="drug-search-input" class="form-control py-2 border-secondary" placeholder="特定藥品過濾..." onkeyup="handleDrugSearch()" disabled>
        <div id="drug-search-dropdown" class="search-dropdown"></div>
      </div>
    </div>
    <div class="table-responsive bg-white shadow-sm rounded flex-grow-1 overflow-auto mb-2" style="border: 1px solid #dee2e6;">
      <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;">
        <thead class="table-academic-head sticky-top shadow-sm" style="top: 0; z-index: 10;">
          <tr class="text-center">
            <th class="text-nowrap">代碼</th>
            <th class="text-start text-nowrap">藥品名稱</th>
            <th class="text-nowrap">日期</th>
            <th class="text-nowrap">SAP數量</th>
            <th class="text-nowrap">盤點總量</th>
            <th class="text-nowrap">差異</th>
            <th class="text-nowrap">操作</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="7" class="text-center py-5 text-muted fw-bold">請執行結算查詢</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-dialog-scrollable">
      <div class="modal-content bg-light">
        <div class="modal-header bg-academic text-white border-0"><h6 class="modal-title fw-bold" id="modal-drug-name"></h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-0">
          <div class="p-2 bg-white border-bottom shadow-sm sticky-top" style="top: 0; z-index: 1050;"><div id="modal-col-toggles" class="d-flex flex-wrap gap-1"></div></div>
          <div class="p-2"><div class="table-responsive bg-white border rounded shadow-sm"><table class="table table-bordered table-sm table-hover align-middle text-nowrap mb-0" style="font-size: 0.85rem;"><thead class="table-academic-head text-center" id="modal-thead"></thead><tbody id="modal-tbody"></tbody></table></div></div>
        </div>
        <div class="modal-footer bg-white border-top p-2"><button type="button" class="btn btn-secondary fw-bold px-4" data-bs-dismiss="modal">關閉</button></div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
